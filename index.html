<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00d2ff" />
    <title>PetGrow — Egg Mixer</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    #boot-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0c0e14;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #boot-loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .boot-loading-card {
      width: min(100%, 420px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 28px 24px;
      border: 2px solid rgba(0, 210, 255, 0.25);
      border-radius: 24px;
      background:
        radial-gradient(circle at top, rgba(0, 210, 255, 0.18), transparent 55%),
        rgba(10, 16, 28, 0.88);
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.45),
        0 0 28px rgba(0, 210, 255, 0.16);
    }
    .boot-loading-animation {
      position: relative;
      width: 124px;
      height: 124px;
      display: grid;
      place-items: center;
    }
    .boot-loading-ring {
      position: absolute;
      inset: 0;
      border: 3px solid rgba(0, 210, 255, 0.14);
      border-top-color: #00d2ff;
      border-radius: 50%;
      animation: boot-spin 1.2s linear infinite;
    }
    .boot-loading-ring-delay {
      inset: 14px;
      border-color: rgba(255, 215, 0, 0.14);
      border-top-color: #ffd700;
      animation-direction: reverse;
      animation-duration: 1.6s;
    }
    .boot-loading-core {
      font-size: 2.8rem;
      filter: drop-shadow(0 0 14px rgba(255, 215, 0, 0.35));
      animation: boot-pulse 1.1s ease-in-out infinite;
    }
    .boot-loading-title {
      font-family: 'Pixelify Sans', 'Press Start 2P', monospace;
      font-size: 1.6rem;
      color: #00d2ff;
      text-shadow: 0 0 12px rgba(0, 210, 255, 0.5);
      margin: 0;
    }
    .boot-loading-text {
      font-family: 'Pixelify Sans', 'Press Start 2P', monospace;
      font-size: 0.85rem;
      color: #8899bb;
      text-align: center;
    }
    @keyframes boot-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes boot-pulse {
      0%, 100% { transform: scale(0.96); opacity: 0.85; }
      50% { transform: scale(1.04); opacity: 1; }
    }
  </style>
  </head>
  <body>
    <div id="boot-loading" aria-live="polite">
      <div class="boot-loading-card">
        <div class="boot-loading-animation" aria-hidden="true">
          <span class="boot-loading-ring"></span>
          <span class="boot-loading-ring boot-loading-ring-delay"></span>
          <span class="boot-loading-core">🥚</span>
        </div>
        <h1 class="boot-loading-title">PetGrow</h1>
        <p class="boot-loading-text">Loading your creatures...</p>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
